trigger:
- main

variables:
- group: Production-Variables

stages:

- stage: CI
  displayName: "Continuous Integration"

  jobs:
  - job: BuildAndTest
    displayName: "Build, Test and Publish"

    pool:
      name: Default

    steps:

    # Checkout source code
    - checkout: self

    # Install .NET SDK
    - task: UseDotNet@2
      displayName: "Install .NET SDK"
      inputs:
        packageType: 'sdk'
        version: '$(DOTNET_VERSION)'

    # Install Node.js
    - task: NodeTool@0
      displayName: "Install Node.js"
      inputs:
        versionSpec: '20.x'

    # Verify Node.js and npm
    - script: |
        echo ===== PATH =====
        echo %PATH%

        echo ===== NODE LOCATION =====
        where node
        where npm

        echo ===== VERSIONS =====
        node -v
        npm -v
      displayName: "Verify Node.js"

    # Restore packages
    - task: DotNetCoreCLI@2
      displayName: "Restore Packages"
      inputs:
        command: restore
        projects: '**/*.slnx'

    # Build solution
    - task: DotNetCoreCLI@2
      displayName: "Build Solution"
      inputs:
        command: build
        projects: '**/*.slnx'
        arguments: '--configuration $(BUILD_CONFIGURATION) --no-restore'

    # Run tests
    - task: DotNetCoreCLI@2
      displayName: "Run Unit Tests"
      inputs:
        command: test
        projects: 'tests/Application.UnitTests/Application.UnitTests.csproj'
        publishTestResults: true
        arguments: '--configuration $(BUILD_CONFIGURATION)'

    # Publish application
    - task: DotNetCoreCLI@2
      displayName: "Publish Application"
      inputs:
        command: publish
        publishWebProjects: false
        projects: 'src/Web/Web.csproj'
        arguments: '--configuration $(BUILD_CONFIGURATION) --output $(Build.ArtifactStagingDirectory)'

    # Publish build artifact
    - task: PublishBuildArtifacts@1
      displayName: "Publish Build Artifact"
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'drop'
        publishLocation: 'Container'