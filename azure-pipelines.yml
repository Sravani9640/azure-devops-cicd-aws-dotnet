trigger:
- main

variables:
- group: Production-Variables

stages:

- stage: CI
  displayName: "Continuous Integration"

  jobs:
  - job: BuildAndTest
    displayName: "Build, Test and Publish Application"

    pool:
      name: Default

    steps:

    # Checkout source code
    - checkout: self

    # Install .NET SDK
    - task: UseDotNet@2
      displayName: "Install .NET SDK"
      inputs:
        packageType: 'sdk'
        version: '$(DOTNET_VERSION)'

    # Install Node.js
    - task: UseNode@1
      displayName: "Install Node.js"
      inputs:
       version: '20.x'

    # Verify Node.js and npm
    #- script: |
        #echo ===== PATH =====
        #echo %PATH%

        #echo ===== NODE LOCATION =====
        #where node
        #where npm

        #echo ===== VERSIONS =====
        #node -v
        #npm -v
      #displayName: "Verify Node.js"

    # Restore packages
    - task: DotNetCoreCLI@2
      displayName: "Restore Packages"
      inputs:
        command: restore
        projects: 'CleanArchitecture.slnx'

    # Build solution
    - task: DotNetCoreCLI@2
      displayName: "Build Solution"
      inputs:
        command: build
        projects: 'CleanArchitecture.slnx'
        arguments: '--configuration $(BUILD_CONFIGURATION) --no-restore'

    # Run tests
    - task: DotNetCoreCLI@2
      displayName: "Run Unit Tests"
      inputs:
        command: test
        projects: 'tests/Application.UnitTests/Application.UnitTests.csproj'
        publishTestResults: true
        arguments: '--configuration $(BUILD_CONFIGURATION)'


    # Publish application
    - task: DotNetCoreCLI@2
      displayName: "Publish Application"
      inputs:
        command: publish
        publishWebProjects: false
        projects: 'src/Web/Web.csproj'
        arguments: '--configuration $(BUILD_CONFIGURATION) --output $(Build.ArtifactStagingDirectory)'
        
    # Publish build artifact
    - task: PublishBuildArtifacts@1
      displayName: "Publish Build Artifact"
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'drop'
        publishLocation: 'Container'

- stage: CD
  displayName: "Continuous Deployment"
  dependsOn: CI
  condition: succeeded()

  jobs:

  - deployment: DeployToEC2
    displayName: "Deploy to AWS EC2"

    environment: Production

    pool:
      name: Default

    strategy:
      runOnce:
        deploy:

          steps:

          - checkout: none

          - download: current
            artifact: drop

          - script: |
              echo Deployment Stage Started
              echo Artifact Downloaded Successfully
              dir $(Pipeline.Workspace)
            displayName: "Verify Artifact"
          - task: CopyFilesOverSSH@0
            displayName: "Copy Artifact to EC2"
            inputs:
             sshEndpoint: 'AWS-EC2'
             sourceFolder: '$(Pipeline.Workspace)/drop'
             contents: '**'
             targetFolder: '/home/ec2-user/deploy'
             cleanTargetFolder: true
             overwrite: true

          - task: SSH@0
            displayName: "Deploy Application"
            inputs:
             sshEndpoint: 'AWS-EC2'
             runOptions: 'inline'
             inline: |
               set -e
               echo "======================================"
               echo "Starting Deployment"
               echo "======================================"

               echo "Installing unzip..."
               sudo dnf install unzip -y

               echo "Creating deployment directory..."
               sudo mkdir -p /opt/cleanarchitecture

               echo "Stopping application service..."
               sudo systemctl stop cleanarchitecture || true

               echo "Creating backup..."

               sudo mkdir -p /opt/backup

               if [ -d "/opt/cleanarchitecture" ]; then
               sudo cp -r /opt/cleanarchitecture /opt/backup/cleanarchitecture_$(date +%Y%m%d_%H%M%S)
               fi

               echo "Cleaning old deployment..."
               sudo rm -rf /opt/cleanarchitecture/*

               echo "Extracting application..."
               sudo unzip -o /home/ec2-user/deploy/Web.zip -d /opt/cleanarchitecture

               echo "Setting ownership..."
               sudo chown -R ec2-user:ec2-user /opt/cleanarchitecture

               echo "Starting application service..."
               sudo systemctl start cleanarchitecture

               echo "Checking service status..."
               sudo systemctl status cleanarchitecture --no-pager

               echo "Waiting for application..."
               sleep 10

               echo "Running Health Check..."
               curl http://localhost:5000

               echo "======================================"
               echo "Deployment Successful"
               echo "======================================"